<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioLink</title>
<style>
  body {
    margin: 0;
    padding: 0;
  }
  .video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }
  .video-background video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    max-width: 400px;
    background-color: rgba(0, 0, 0, 0.8); /* black rectangle */
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
    padding: 20px;
    overflow-y: scroll;
    scrollbar-width: thin;
    scrollbar-color: #ffffff transparent;
    color: white; /* white text */
    z-index: 1; /* Ensure the rectangle is on top */
  }
  .profile-pic {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto;
    position: relative;
    top: -50px;
    z-index: 2; /* Position the profile picture above the rectangle */
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* mild glow */
  }
  .profile-pic img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  h1 {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
  }
  p {
    font-style: italic;
    text-align: justify;
  }
</style>
</head>
<body>
<div class="video-background">
  <video autoplay loop>
    <source src="assets/vid.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>
<div class="container">
  <div class="profile-pic">
    <img src="assets/pic.png" alt="Profile Picture">
  </div>
  <h1>Title</h1>
  <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
</div>
</body>
</html>
