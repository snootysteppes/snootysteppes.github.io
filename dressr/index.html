<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hairdressing Services</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Hair Glamour</div>
    <nav>
      <ul>
        <li><a href="#services">Services</a></li>
        <li><a href="#team">Our Team</a></li>
        <li><a href="#booking">Book Now</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="hero">
    <div class="hero-text">
      <h1>Feel Beautiful, Inside & Out</h1>
      <p>Experience the best hairdressing services in town.</p>
      <button onclick="scrollToBooking()">Book an Appointment</button>
    </div>
  </section>

  <section id="services">
    <h2>Our Services</h2>
    <div class="service-container" id="service-container"></div>
  </section>

  <section id="team">
    <h2>Meet Our Team</h2>
    <div class="team-container">
      <div class="team-member">
        <img src="stylist-1.jpg" alt="Stylist 1">
        <h3>Jane Doe</h3>
        <p>Master Stylist</p>
      </div>
      <div class="team-member">
        <img src="stylist-2.jpg" alt="Stylist 2">
        <h3>John Smith</h3>
        <p>Senior Stylist</p>
      </div>
    </div>
  </section>

  <section id="booking">
    <h2>Book an Appointment</h2>
    <form id="booking-form">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>
      
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      
      <label for="service">Choose Service:</label>
      <select id="service" name="service">
        <option value="haircut">Haircut</option>
        <option value="color">Hair Coloring</option>
        <option value="style">Styling</option>
      </select>

      <label for="date">Date:</label>
      <input type="date" id="date" name="date" required>
      
      <button type="submit">Submit</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2024 Hair Glamour. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
